<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF3B30;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF2D55;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#AF52DE;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="foldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    
    <filter id="innerGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="-4" stdDeviation="8" flood-color="#ffffff" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- App Icon Base -->
  <rect width="512" height="512" rx="116" fill="url(#bgGrad)" />
  
  <!-- Subtle Grid/Texture in background (Optional) -->
  <path d="M0 0 L512 512 M512 0 L0 512" stroke="#ffffff" stroke-width="2" opacity="0.05" />

  <!-- Book/Pocket Shape -->
  <g filter="url(#shadow)">
    <!-- Back Page Left -->
    <path d="M140 160 C 140 140, 160 130, 180 130 L 250 130 L 250 360 C 250 360, 180 390, 160 380 C 140 370, 140 350, 140 350 Z" fill="rgba(255,255,255,0.7)" />
    <!-- Back Page Right -->
    <path d="M372 160 C 372 140, 352 130, 332 130 L 262 130 L 262 360 C 262 360, 332 390, 352 380 C 372 370, 372 350, 372 350 Z" fill="rgba(255,255,255,0.6)" />
    
    <!-- Front Page Left (Folded) -->
    <path d="M120 180 C 120 160, 150 150, 170 150 L 256 150 L 256 390 L 170 390 C 150 390, 120 370, 120 350 Z" fill="url(#foldGrad)" filter="url(#innerGlow)" />
    <!-- Front Page Right (Folded) -->
    <path d="M392 180 C 392 160, 362 150, 342 150 L 256 150 L 256 390 L 342 390 C 362 390, 392 370, 392 350 Z" fill="#ffffff" filter="url(#innerGlow)" />
  </g>
  
  <!-- Subtle Pocket detail / Bookmark -->
  <path d="M256 150 L 290 200 L 256 230 L 222 200 Z" fill="url(#bgGrad)" opacity="0.8" />
</svg>
